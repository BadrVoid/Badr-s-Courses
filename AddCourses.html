<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://i.pinimg.com/1200x/2d/3e/10/2d3e1010d900bbe48926d78a57a8c351.jpg" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    <title>BadrCourses | Add Courses</title>
</head>

<body>
    <nav>
        <div class="logo">Badr<span>Courses</span></div>
        <div class="nav-links">
            <a href="index.html">Home </a>| <a href="Courses.html">My Courses </a>|
            <a href="AddCourses.html">Add Courses </a>|
            <a href="ContactUs.html">Contact Us</a>
        </div>
    </nav>

    <main class="add">
        <div class="add-container">
            <p class="addTitle">Add New Course</p>

            <form action="#">
                <label>COURSE NAME</label>
                <input type="text" placeholder="e.g. Math-2" />

                <label>TEACHER NAME</label>
                <input type="text" placeholder="e.g. Dr. Miller" />

                <label>STUDY TIME</label>
                <select>
                    <option value="2">2 Hours</option>
                    <option value="3">3 Hours</option>
                    <option value="4">4 Hours</option>
                </select>

                <label>EXTRA NOTES</label>
                <textarea placeholder="Write a small description about the course..."></textarea>

                <button type="submit" class="add-btn">SAVE COURSE</button>
            </form>
        </div>
    </main>
    <footer id="course-footer">
        <div class="footer-container">
            <p>&copy; 2026 <span>BadrCourses</span> | Your academic journey, simplified.</p>
            <p class="tagline">Built with passion for learners.</p>
        </div>
    </footer>
</body>

</html>
